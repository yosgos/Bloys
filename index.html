<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ממשק משפחתי - משפחת בלוי</title>
    <style>
        /* ייבוא פונטים מ-Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Frank+Ruhl+Libre:wght@700&display=swap');

        :root {
            --primary-color: #1a2a3a; 
            --accent-color: #c5a059;  
            --bg-gradient: linear-gradient(135deg, #fdfcfb 0%, #f4ece2 100%);
            --white: #ffffff;
            --soft-gold: rgba(197, 160, 89, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Assistant', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tabs Navigation - Flowing & Light Style */
        .tabs-nav {
            background: var(--white);
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            gap: 12px;
            border-bottom: 1px solid rgba(26, 42, 58, 0.05);
            z-index: 100;
        }

        .tab-btn {
            border: none;
            outline: none;
            padding: 10px 25px;
            cursor: pointer;
            background: transparent;
            color: var(--primary-color);
            
            font-family: 'Assistant', sans-serif;
            font-weight: 700;
            font-size: 17px;
            
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: var(--soft-gold);
            color: var(--accent-color);
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: var(--white);
            box-shadow: 0 4px 12px rgba(26, 42, 58, 0.2);
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            position: relative;
            background: white;
        }

        .tab-panel {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .tab-panel.active {
            display: block;
        }

        /* Frame Styling for nested HTML files or URLs */
        .embedded-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- ניווט כרטיסיות עם שמות מעודכנים -->
    <nav class="tabs-nav" id="mainNav">
        <button class="tab-btn active" onclick="switchTab(event, 'tab1')">
            <span>📜</span> שמות לתפילה
        </button>
        <button class="tab-btn" onclick="switchTab(event, 'tab2')">
            <span>📅</span> אירועי החודש
        </button>
    </nav>

    <main class="content-area">
        
        <!-- כרטיסייה 1: הצגת URL -->
        <div id="tab1" class="tab-panel active">
            <iframe class="embedded-frame" id="frame1" title="Names List"></iframe>
        </div>

        <!-- כרטיסייה 2: הצגת URL -->
        <div id="tab2" class="tab-panel">
            <iframe class="embedded-frame" id="frame2" title="Monthly Events"></iframe>
        </div>

    </main>

    <script>
        // פונקציית החלפת כרטיסיות
        function switchTab(event, tabId) {
            const panels = document.querySelectorAll('.tab-panel');
            panels.forEach(p => p.classList.remove('active'));

            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- הגדרות הכתובות להטמעה ---
        
        // כאן אתה פשוט מחליף את הכתובת למה שאתה רוצה
        const url1 = "https://yosgos.github.io/BloysName/"; // דוגמה: ויקיפדיה
        const url2 = "https://yosgos.github.io/birhday/"; // דוגמה: בינג

        // טעינת הכתובות לתוך ה-Iframes בטעינת הדף
        window.onload = () => {
            document.getElementById('frame1').src = url1;
            document.getElementById('frame2').src = url2;
        };
    </script>
</body>
</html>
